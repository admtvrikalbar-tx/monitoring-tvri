<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVRI MONITORING | CENTERED DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --accent: #38bdf8;
            --overlay-bg: rgba(15, 23, 42, 0.85);
            --amber: #fbce7c;
        }

        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Grid Full Layar */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            width: 100vw; 
            height: 100vh; 
        }

        .video-box { 
            position: relative; 
            border: 0.5px solid #1e293b; 
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Label Channel */
        .ch-label { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            color: var(--accent); 
            padding: 5px 12px; 
            font-size: 11px; font-weight: 800; 
            border-radius: 4px; z-index: 10;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; gap: 6px;
        }

        /* Overlay Informasi Tengah Bawah */
        .floating-center-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            background: var(--overlay-bg);
            backdrop-filter: blur(12px);
            padding: 18px 45px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            min-width: 650px; /* Lebar ditambah agar teks muat satu baris */
        }

        #date { 
            font-size: 12px; font-weight: 600; 
            color: var(--accent); letter-spacing: 2px;
            margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .clock-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .station-id {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            border-right: 2px solid var(--accent);
            padding-right: 15px;
        }

        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 32px; font-weight: 800; 
            color: #fff; line-height: 1;
        }

        .shift-details {
            font-size: 11px; font-weight: 500; color: var(--amber);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .live-dot { height: 7px; width: 7px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="floating-center-info">
        <div id="date">MEMUAT TANGGAL...</div>
        <div class="clock-row">
            <div class="station-id">TVRI KALBAR | TRANSMISI PONTIANAK</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
        <div id="shift-display" class="shift-details">MENGAMBIL DATA PETUGAS STANDBY...</div>
    </div>

    <div class="grid-container">
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> NASIONAL</div>
            <video id="v1" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> SPORT</div>
            <video id="v2" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> WORLD</div>
            <video id="v3" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> KALBAR</div>
            <video id="v4" controls muted autoplay playsinline></video>
        </div>
    </div>

            "31": {"1": "Sangaji, Ibnu Sulthan, Ahmad Wildan", "2": "Ramadhan Surya, Rizky", "3": "Edi Kurniadi, Merdi Tri"}
        };

        function updateUI() {
            const now = new Date();
            
            // Jam & Detik
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID') + " WIB";
            
            // Tanggal Tengah
            const opsiTgl = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', opsiTgl).toUpperCase();
            
            // Logic Shift
            const tgl = now.getDate();
            const jam = now.getHours();
            let shift = "";
            let jamShift = "";

            if (jam >= 0 && jam < 8) { shift = "1"; jamShift = "00:00 - 08:00"; }
            else if (jam >= 8 && jam < 16) { shift = "2"; jamShift = "08:00 - 16:00"; }
            else { shift = "3"; jamShift = "16:00 - 00:00"; }

            let petugas = dataJadwal[tgl] ? dataJadwal[tgl][shift] : "DATA TIDAK TERSEDIA";
            document.getElementById('shift-display').innerText = `SHIFT ${shift} (${jamShift}) • OPERATOR: ${petugas}`;
        }

        setInterval(updateUI, 1000);
        updateUI();

        const streams = [
            { id: 'v1', url: 'https://ott-balancer.tvri.go.id/live/eds/Nasional/hls/Nasional-avc1_1500000=10003-mp4a_96000_eng=20000.m3u8' },
            { id: 'v2', url: 'https://ott-balancer.tvri.go.id/live/eds/SportHD/hls/SportHD-avc1_900000=10002-mp4a_96000=20002.m3u8' },
            { id: 'v3', url: 'https://ott-balancer.tvri.go.id/live/eds/TVRIWorld/hls/TVRIWorld-avc1_1500000=10003-mp4a_96000=20002.m3u8' },
            { id: 'v4', url: 'https://ott-balancer.tvri.go.id/live/eds/Kalbar/hls/Kalbar-avc1_900000=10005-mp4a_96000=20003.m3u8' }
        ];

        streams.forEach(s => {
            const v = document.getElementById(s.id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(s.url);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, function() { v.play(); });
            }
        });
    </script>
</body>
</html>
