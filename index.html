<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVRI CHANNEL MONITORING</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #020617; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 5px; }
        #clock { font-family: monospace; font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        
        .ticker-container {
            background: #0f172a;
            border: 1px solid #1e293b;
            color: #fbbf24;
            padding: 8px 0;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 1400px; margin: auto; }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }

        .video-box { 
            background: #000; border: 1px solid #1e293b; position: relative; 
            border-radius: 4px; overflow: hidden; transition: all 0.3s;
        }
        .video-box:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        .label { 
            position: absolute; top: 0; left: 0; background: rgba(2, 6, 23, 0.9); 
            padding: 5px 15px; font-size: 12px; font-weight: bold; z-index: 10;
            border-bottom-right-radius: 8px; display: flex; align-items: center; gap: 8px;
        }
        .live-dot { height: 8px; width: 8px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <div><strong>TVRI TRANSMISSION MONITORING</strong> | KALBAR</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="ticker-container">
        <marquee id="shift-ticker" scrollamount="6">Menginisialisasi Jadwal Petugas Satuan Transmisi...</marquee>
    </div>

    <div class="grid-container">
        <div class="video-box"><div class="label"><span class="live-dot"></span> NASIONAL</div><video id="v1" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> SPORT</div><video id="v2" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> WORLD</div><video id="v3" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> KALBAR</div><video id="v4" controls muted autoplay playsinline></video></div>
    </div>

    <script>
        const dataJadwal = {
            "7":  {"1": "Ilham Sidik, Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Hanevi Azhar, Surya Darma, Sangaji, Rizky Ramdhani, Andi Nur", "3": "Usman, Merdi Tri"},

            "10": {"1": "Ramadhan Surya, Ibnu Sulthan, Sangaji", "2": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik"},
            "11": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik", "2": "Sangaji", "3": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan"},
            "12": {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Rizky, Andi Nur", "3": "Sangaji"},
            "13": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "14": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya"},
            "15": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "16": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "17": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan, Rizky, Andi Nur", "3": "Ahmad Wildan, Ramadhan Surya"},
            "18": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},

            "21": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "22": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya, Rizky, Andi Nur", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},

            "26": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan, Rizky, Andi Nur", "3": "Ahmad Wildan, Ramadhan Surya"},
            "27": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "28": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "29": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya, Rizky"},
            "30": {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji"},
            "31": {"1": "Sangaji, Ibnu Sulthan, Ahmad Wildan", "2": "Ramadhan Surya, Rizky", "3": "Edi Kurniadi, Merdi Tri"}
        };

        function updateMonitoring() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            clockEl.innerText = now.toLocaleTimeString('id-ID');
            
            const tanggal = now.getDate();
            const jam = now.getHours();
            let shift = "";

            if (jam >= 0 && jam < 8) shift = "1";
            else if (jam >= 8 && jam < 16) shift = "2";
            else shift = "3";

            let petugas = "Data Tidak Tersedia";
            if (dataJadwal[tanggal]) {
                petugas = dataJadwal[tanggal][shift];
            }

            const tickerText = `[SHIFT ${shift}] PETUGAS STANDBY: ${petugas} --- LOKASI: SATUAN TRANSMISI TVRI KALBAR`;
            const tickerEl = document.getElementById('shift-ticker');
            
            if (tickerEl.innerText !== tickerText) {
                tickerEl.innerText = tickerText;
            }
        }

        setInterval(updateMonitoring, 1000);
        updateMonitoring();

        const streams = [
            { id: 'v1', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_nasional_backup.m3u8' },
            { id: 'v2', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_sport_backup.m3u8' },
            { id: 'v3', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_world_backup.m3u8' },
            { id: 'v4', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_kalimantan_barat.m3u8' }
        ];

        streams.forEach(s => {
            const v = document.getElementById(s.id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(s.url);
                hls.attachMedia(v);
            }
        });
    </script>
</body>
</html>
