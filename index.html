<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVRI TRANSMISSION MONITORING - MODERN BLUE</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --bg-dark: #0f172a;      /* Navy Blue gelap */
            --bg-panel: #1e293b;     /* Slate Blue untuk panel */
            --accent-blue: #38bdf8;  /* Sky Blue modern */
            --text-main: #f1f5f9;    /* Putih kebiruan */
            --ticker-gold: #fbce7c;  /* Soft Amber */
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding: 15px; 
            letter-spacing: 0.5px;
        }
        
        /* Header & Clock Section */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid rgba(56, 189, 248, 0.3); 
            padding-bottom: 12px; 
            margin-bottom: 8px; 
        }
        
        .header-title { display: flex; flex-direction: column; }
        .header-title strong { color: var(--accent-blue); font-size: 1.2rem; }
        .header-title span { font-size: 0.8rem; opacity: 0.7; }

        #clock-container { text-align: right; }
        #date { font-size: 0.85rem; opacity: 0.8; font-weight: 500; }
        #clock { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; color: var(--text-main); font-weight: 700; }
        
        /* Ticker Style - Modern Glassmorphism */
        .ticker-container {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: var(--ticker-gold);
            padding: 10px 0;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 6px;
        }

        /* Video Grid Layout */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            max-width: 1400px; 
            margin: auto; 
        }
        @media (max-width: 900px) { .grid-container { grid-template-columns: 1fr; } }

        .video-box { 
            background: #000; 
            border: 1px solid var(--bg-panel); 
            position: relative; 
            border-radius: 8px; 
            overflow: hidden; 
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .video-box:hover { 
            border-color: var(--accent-blue); 
            transform: scale(1.01);
        }
        video { width: 100%; display: block; aspect-ratio: 16/9; }

        /* Label Style */
        .label { 
            position: absolute; top: 12px; left: 12px; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(4px);
            color: var(--accent-blue); 
            padding: 4px 12px; 
            font-size: 11px; 
            font-weight: 800; 
            z-index: 10;
            border-radius: 4px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; gap: 8px;
        }
        .live-dot { height: 6px; width: 6px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">
            <strong>TVRI TRANSMISSION MONITORING</strong>
            <span>LPP TVRI STASIUN KALIMANTAN BARAT</span>
        </div>
        <div id="clock-container">
            <div id="date">MEMUAT DATA...</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
    </div>

    <div class="ticker-container">
        <marquee id="shift-ticker" scrollamount="5">MENGHUBUNGKAN KE SERVER JADWAL...</marquee>
    </div>

    <div class="grid-container">
        <div class="video-box"><div class="label"><span class="live-dot"></span> NASIONAL</div><video id="v1" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> SPORT</div><video id="v2" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> WORLD</div><video id="v3" controls muted autoplay playsinline></video></div>
        <div class="video-box"><div class="label"><span class="live-dot"></span> KALBAR</div><video id="v4" controls muted autoplay playsinline></video></div>
    </div>

    <script>
        const dataJadwal = {
            "7":  {"1": "Ilham Sidik, Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Hanevi Azhar, Surya Darma, Sangaji, Rizky Ramdhani, Ikbal", "3": "Usman, Merdi Tri"},
            "8":  {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Ahmad Wildan", "2": "Usman, Merdi Tri", "3": "Hanevi Azhar, Surya Darma, Sangaji"},
            "9":  {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan, Sangaji", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik", "3": "Usman, Merdi Tri"},
            "10": {"1": "Ramadhan Surya, Ibnu Sulthan, Sangaji", "2": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik"},
            "11": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik", "2": "Sangaji", "3": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan"},
            "12": {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Rizky, Ikbal", "3": "Sangaji"},
            "13": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "14": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya"},
            "15": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "16": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "17": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan, Rizky, Ikbal", "3": "Ahmad Wildan, Ramadhan Surya"},
            "18": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "19": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "20": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya"},
            "21": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "22": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya, Rizky, Ikbal", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "23": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya"},
            "24": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "25": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "26": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan, Rizky, Ikbal", "3": "Ahmad Wildan, Ramadhan Surya"},
            "27": {"1": "Ahmad Wildan, Ramadhan Surya", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji, Ibnu Sulthan"},
            "28": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"},
            "29": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "2": "Sangaji, Ibnu Sulthan", "3": "Ahmad Wildan, Ramadhan Surya, Rizky"},
            "30": {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri", "3": "Sangaji"},
            "31": {"1": "Sangaji, Ibnu Sulthan, Ahmad Wildan", "2": "Ramadhan Surya, Rizky", "3": "Edi Kurniadi, Merdi Tri"}
        };

        function updateMonitoring() {
            const now = new Date();
            
            // Format Tanggal: SENIN, 7 MEI 2026
            const opsiTanggal = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', opsiTanggal).toUpperCase();
            
            // Jam
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID') + " WIB";
            
            const tanggal = now.getDate();
            const jam = now.getHours();
            let shift = "";
            let jamShift = "";

            if (jam >= 0 && jam < 8) { shift = "1"; jamShift = "00:00 - 08:00 WIB"; }
            else if (jam >= 8 && jam < 16) { shift = "2"; jamShift = "08:00 - 16:00 WIB"; }
            else { shift = "3"; jamShift = "16:00 - 00:00 WIB"; }

            let petugas = "DATABASE_OFFLINE";
            if (dataJadwal[tanggal]) {
                petugas = dataJadwal[tanggal][shift];
            }

            const tickerText = `[SHIFT ${shift}] • OPERATOR: ${petugas} • JADWAL: ${jamShift} • TRANSMISI TVRI KALBAR`;
            const tickerEl = document.getElementById('shift-ticker');
            
            if (tickerEl.innerText !== tickerText) {
                tickerEl.innerText = tickerText;
            }
        }

        setInterval(updateMonitoring, 1000);
        updateMonitoring();

        const streams = [
            { id: 'v1', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_nasional_backup.m3u8' },
            { id: 'v2', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_sport_backup.m3u8' },
            { id: 'v3', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_world_backup.m3u8' },
            { id: 'v4', url: 'https://play.mcpcasiasat.com/tvri/tvri_tvri_kalimantan_barat.m3u8' }
        ];

        streams.forEach(s => {
            const v = document.getElementById(s.id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(s.url);
                hls.attachMedia(v);
            }
        });
    </script>
</body>
</html>
