<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVRI MONITORING | KALBAR</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --accent: #38bdf8;
            --overlay-bg: rgba(15, 23, 42, 0.7);
        }

        * { box-sizing: border-box; }

        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }

        /* Grid Full Layar */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            width: 100vw; 
            height: 100vh; 
        }

        .video-box { 
            position: relative; 
            border: 0.5px solid #1e293b; 
            background: #000;
            overflow: hidden;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Memastikan video memenuhi kotak */
        }

        /* Label Nama Channel */
        .ch-label { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: var(--overlay-bg);
            backdrop-filter: blur(4px);
            color: var(--accent); 
            padding: 4px 12px; 
            font-size: 10px; 
            font-weight: 800; 
            border-radius: 4px;
            z-index: 10;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; gap: 5px;
        }

        /* Overlay Informasi Melayang (Floating) */
        .floating-info {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 15px 20px;
            z-index: 100;
            pointer-events: none; /* Agar tidak mengganggu klik video */
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .info-left { color: white; }
        .info-left .pagu { font-size: 14px; font-weight: bold; color: var(--accent); }
        .info-left .shift-info { font-size: 11px; color: #fbce7c; margin-top: 2px; }

        .info-right { text-align: right; color: white; }
        #date { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
        #clock { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: bold; }

        .live-dot { height: 6px; width: 6px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="floating-info">
        <div class="info-left">
            <div class="pagu">TVRI KALIMANTAN BARAT | TRANSMISI PONTIANAK</div>
            <div id="shift-display" class="shift-info">MENGAMBIL DATA SHIFT...</div>
        </div>
        <div class="info-right">
            <div id="date">KAMIS, 7 MEI 2026</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> CH_01: NASIONAL</div>
            <video id="v1" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> CH_02: SPORT</div>
            <video id="v2" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> CH_03: WORLD</div>
            <video id="v3" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> CH_04: KALBAR</div>
            <video id="v4" controls muted autoplay playsinline></video>
        </div>
    </div>

        function updateUI() {
            const now = new Date();
            
            // Update Jam
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID') + " WIB";
            
            // Update Tanggal
            const opsiTgl = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', opsiTgl).toUpperCase();
            
            // Update Shift & Petugas
            const tgl = now.getDate();
            const jam = now.getHours();
            let shift = "";
            let jamShift = "";

            if (jam >= 0 && jam < 8) { shift = "1"; jamShift = "00:00 - 08:00"; }
            else if (jam >= 8 && jam < 16) { shift = "2"; jamShift = "08:00 - 16:00"; }
            else { shift = "3"; jamShift = "16:00 - 00:00"; }

            let petugas = dataJadwal[tgl] ? dataJadwal[tgl][shift] : "DATA TIDAK ADA";
            document.getElementById('shift-display').innerText = `SHIFT ${shift} (${jamShift}) | PETUGAS: ${petugas}`;
        }

        setInterval(updateUI, 1000);
        updateUI();

        const streams = [
            { id: 'v1', url: 'https://ott-balancer.tvri.go.id/live/eds/Nasional/hls/Nasional-avc1_1500000=10003-mp4a_96000_eng=20000.m3u8' },

        ];

        streams.forEach(s => {
            const v = document.getElementById(s.id);
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(s.url);
                hls.attachMedia(v);
            }
        });
