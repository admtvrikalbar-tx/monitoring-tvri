<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVRI MONITORING | PROFESSIONAL DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { 
            --accent: #38bdf8;
            --overlay-bg: rgba(15, 23, 42, 0.65); /* Opacity dikurangi agar efek blur lebih terasa */
            --amber: #fbce7c;
        }

        * { box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Grid Full Layar */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            width: 100vw; 
            height: 100vh; 
        }

        .video-box { 
            position: relative; 
            border: 0.5px solid #1e293b; 
            background: #000;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Label Channel */
        .ch-label { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--overlay-bg);
            backdrop-filter: blur(10px); /* Blur ringan untuk label */
            color: var(--accent); 
            padding: 5px 12px; 
            font-size: 11px; font-weight: 800; 
            border-radius: 4px; z-index: 10;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: flex; align-items: center; gap: 6px;
        }

        /* Overlay Informasi Tengah Bawah dengan Efek Blur Tebal */
        .floating-center-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            background: var(--overlay-bg);
            backdrop-filter: blur(20px); /* Efek blur dipertebal */
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 50px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            min-width: 700px;
        }

        #date { 
            font-size: 12px; font-weight: 600; 
            color: var(--accent); letter-spacing: 2px;
            margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .clock-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }

        .station-id {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            border-right: 2px solid var(--accent);
            padding-right: 20px;
        }

        #clock { 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 36px; font-weight: 800; 
            color: #fff; line-height: 1;
        }

        .shift-details {
            font-size: 12px; font-weight: 500; color: var(--amber);
            text-transform: uppercase; letter-spacing: 1px;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .live-dot { height: 7px; width: 7px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="floating-center-info">
        <div id="date">MEMUAT TANGGAL...</div>
        <div class="clock-row">
            <div class="station-id">TVRI KALBAR | TRANSMISI PONTIANAK</div>
            <div id="clock">00:00:00 WIB</div>
        </div>
        <div id="shift-display" class="shift-details">MENUNGGU DATA OPERATOR...</div>
    </div>

    <div class="grid-container">
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> NASIONAL (AUTO)</div>
            <video id="v1" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> SPORT (AUTO)</div>
            <video id="v2" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> WORLD (AUTO)</div>
            <video id="v3" controls muted autoplay playsinline></video>
        </div>
        <div class="video-box">
            <div class="ch-label"><span class="live-dot"></span> KALBAR (AUTO)</div>
            <video id="v4" controls muted autoplay playsinline></video>
        </div>
    </div>

    <script>
        const dataJadwal = {
            "7":  {"1": "Ilham Sidik, Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Hanevi Azhar, Surya Darma, Sangaji, Rizky Ramdhani, Ikbal", "3": "Usman, Merdi Tri"},
            "8":  {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik, Ahmad Wildan", "2": "Usman, Merdi Tri", "3": "Hanevi Azhar, Surya Darma, Sangaji"},
            "9":  {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan, Sangaji", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik", "3": "Usman, Merdi Tri"},
            "10": {"1": "Ramadhan Surya, Ibnu Sulthan, Sangaji", "2": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik"},
            "11": {"1": "Edi Kurniadi, Ramadhani, Ilham Sidik", "2": "Sangaji", "3": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan"},
            "12": {"1": "Ahmad Wildan, Ramadhan Surya, Ibnu Sulthan", "2": "Edi Kurniadi, Ramadhani, Ilham Sidik, Rizky, Ikbal", "3": "Sangaji"},
            "13": {"1": "Sangaji, Ibnu Sulthan", "2": "Ahmad Wildan, Ramadhan Surya", "3": "Edi Kurniadi, Ramadhani, Ilham Sidik, Usman, Merdi Tri"}
        };

        function updateUI() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID') + " WIB";
            const opsiTgl = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', opsiTgl).toUpperCase();
            
            const tgl = now.getDate();
            const jam = now.getHours();
            let shift = (jam >= 0 && jam < 8) ? "1" : (jam >= 8 && jam < 16) ? "2" : "3";
            let jamShift = (shift === "1") ? "00:00 - 08:00" : (shift === "2") ? "08:00 - 16:00" : "16:00 - 00:00";
            let petugas = dataJadwal[tgl] ? dataJadwal[tgl][shift] : "DATA TIDAK TERSEDIA";
            document.getElementById('shift-display').innerText = `SHIFT ${shift} (${jamShift}) • OPERATOR: ${petugas}`;
        }

        setInterval(updateUI, 1000);
        updateUI();

        const streams = [
            { id: 'v1', url: 'https://ott-balancer.tvri.go.id/live/eds/Nasional/hls/Nasional.m3u8' },
            { id: 'v2', url: 'https://ott-balancer.tvri.go.id/live/eds/SportHD/hls/SportHD.m3u8' },
            { id: 'v3', url: 'https://ott-balancer.tvri.go.id/live/eds/TVRIWorld/hls/TVRIWorld.m3u8' },
            { id: 'v4', url: 'https://ott-balancer.tvri.go.id/live/eds/Kalbar/hls/Kalbar.m3u8' }
        ];

        streams.forEach(s => {
            const v = document.getElementById(s.id);
            if (Hls.isSupported()) {
                const hls = new Hls({ enableWorker: true, lowLatencyMode: true });
                hls.loadSource(s.url);
                hls.attachMedia(v);
                hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
            } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                v.src = s.url;
            }
        });
    </script>
</body>
</html>
